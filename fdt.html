<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>My first three.js app</title>
    <style>
        body {
            margin: 0;
        }
    </style>
</head>

<body>
    <script>

        function draw() {

            let cadre_v = parseFloat(document.getElementById("cadre_v").value)
            let cadre_h = parseFloat(document.getElementById("cadre_h").value)
            let epaisseur_chevron = parseFloat(document.getElementById("epaisseur_chevron").value)
            let epaisseur_totale = parseFloat(document.getElementById("epaisseur_totale").value)
            let angle_haut = parseFloat(document.getElementById("angle_haut").value)
            let angle_bas = parseFloat(document.getElementById("angle_bas").value)
            let angle_droite = parseFloat(document.getElementById("angle_droite").value)
            let angle_gauche = parseFloat(document.getElementById("angle_gauche").value)

            const face = document.querySelector("#face .content");
            face.innerHTML = ''
            const gauche = document.querySelector("#gauche .content");
            gauche.innerHTML = ''
            const dessus = document.querySelector("#dessus .content");
            dessus.innerHTML = ''

            function path(d) {
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", d);
                path.setAttribute("stroke", "black");
                path.setAttribute("fill", "none");
                return path
            }
            function text(x, y, t, a) {
                const e = document.createElementNS("http://www.w3.org/2000/svg", "text");
                e.setAttribute("x", x);
                e.setAttribute("y", y);
                e.setAttribute("text-anchor", a);
                e.appendChild(document.createTextNode(t));
                return e;
            }

            function pathElem(pts) {
                let d = ""
                for (let pt of pts) {
                    d += d.length ? " L " : "M ";
                    d += `${pt.x.toString()} ${pt.y.toString()}`
                }
                d += " Z"
                return path(d);
            }
            function appendGroup(elem) {
                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                elem.appendChild(g)
                return g;
            }


            function addPathToView(element, path2d) {
                let pe = pathElem(path2d);
                element.appendChild(pe);
            }
            function addHCoteToView(element, bb, off, a, b) {
                if (a.x === b.x) return;
                element.appendChild(path(`M ${a.x} ${bb.y - off} v -10 v 5 H ${b.x} v -5 v 10`))
                element.appendChild(text((a.x + b.x) / 2, bb.y - off - 10, Math.abs(a.x - b.x).toFixed(1), "middle"))
            }
            function addVCoteToView(element, bb, off, a, b) {
                element.appendChild(path(`M ${bb.x - off} ${a.y} h -10 h 5 V ${b.y} h -5 h 10`))
                element.appendChild(text(bb.x - off - 10, (a.y + b.y) / 2, Math.abs(a.y - b.y).toFixed(1), "end"))

            }
            function addCotesToView(element, bb, path2d) {
                addHCoteToView(element, bb, 5, path2d[0], path2d[1]);
                addHCoteToView(element, bb, 5, path2d[1], path2d[2]);
                addHCoteToView(element, bb, 35, path2d[2], path2d[3]);
                addHCoteToView(element, bb, 5, path2d[3], path2d[0]);
                addVCoteToView(element, bb, 5, path2d[1], path2d[2]);

            }

            function dot(u, v) { return u.x * v.x + u.y * v.y + u.z * v.z }
            function cross(u, v) { return { x: u.y * v.z - u.z * v.y, y: u.z * v.x - u.x * v.z, z: u.x * v.y - u.y * v.x } }
            function diff(u, v) { return { x: u.x - v.x, y: u.y - v.y, z: u.z - v.z } }
            function mul(u, v) { return { x: u.x * v, y: u.y * v, z: u.z * v } }
            function normalize(u) { return mul(u, f = 1. / Math.sqrt(dot(u, u))) }

            function drawPath(pts, title) {
                addPathToView(face, pts.map(p => { return { x: p.x, y: p.y } }));
                addPathToView(dessus, pts.map(p => { return { x: p.x, y: p.z } }));
                addPathToView(gauche, pts.map(p => { return { x: p.z, y: p.y } }));

                let u = normalize(diff(pts[1], pts[0]))
                let w = normalize(cross(u, diff(pts[3], pts[0])))
                let v = normalize(cross(w, u))
                let projected_points = pts.map(p => { return { x: dot(u, diff(p, pts[0])), y: dot(v, diff(p, pts[0])) } });
                let path_element = pathElem(projected_points);
                let g = appendGroup(eclatee);
                g.appendChild(path_element);
                let bb = path_element.getBBox()
                addCotesToView(g, bb, projected_points);
                if (title)
                    g.appendChild(text(bb.x + bb.width / 2, bb.y + bb.height / 2, title, "middle"))
            }

            function drawRectangles(rs) {
                const corners = [{ x: "xl", y: "yl", t: "gauche" }, { x: "xl", y: "yh", t: "bas" }, { x: "xh", y: "yh", t: "droite" }, { x: "xh", y: "yl", t: "haut" }, { x: "xl", y: "yl" }]
                for (let ci = 0; ci < corners.length - 1; ci++) {
                    for (let ri = 0; ri < rs.length - 1; ri++) {
                        let c1 = corners[ci], c2 = corners[ci + 1], r1 = rs[ri], r2 = rs[ri + 1];
                        drawPath([{ x: r1[c2.x], y: r1[c2.y], z: r1.z }, { x: r1[c1.x], y: r1[c1.y], z: r1.z },
                        { x: r2[c1.x], y: r2[c1.y], z: r2.z }, { x: r2[c2.x], y: r2[c2.y], z: r2.z }], c1.t)
                    }
                }
            }

            drawRectangles(
                [{ xl: 0, xh: cadre_h, yl: 0, yh: cadre_v, z: 0 },
                { xl: 0, xh: cadre_h, yl: 0, yh: cadre_v, z: epaisseur_chevron },
                {
                    xl: 0 - Math.tan(angle_gauche * Math.PI / 180) * (epaisseur_totale - epaisseur_chevron),
                    xh: cadre_h + Math.tan(angle_droite * Math.PI / 180) * (epaisseur_totale - epaisseur_chevron),
                    yl: 0 - Math.tan(angle_haut * Math.PI / 180) * (epaisseur_totale - epaisseur_chevron),
                    yh: cadre_v + Math.tan(angle_bas * Math.PI / 180) * (epaisseur_totale - epaisseur_chevron),
                    z: epaisseur_totale
                }
                ])

            let margin = 50;
            let fbb = face.getBBox();
            document.querySelector("#face").setAttribute("transform", `translate(${-fbb.x} ${-fbb.y})`)
            let dbb = dessus.getBBox();
            document.querySelector("#dessus").setAttribute("transform", `translate(${-fbb.x} ${fbb.height - dbb.y + margin})`)
            let gbb = gauche.getBBox();
            document.querySelector("#gauche").setAttribute("transform", `translate(${fbb.width + margin - gbb.x} ${-fbb.y})`)
            let ym = fbb.height - dbb.y + margin + dbb.height + margin * 2;
            for (let e of eclatee.childNodes) {
                let bb = e.getBBox()
                e.setAttribute("transform", `translate(${- bb.x} ${- bb.y + ym})`);
                ym += bb.height + margin;
            }

            let svg = document.getElementById("svg")
            let bbox = svg.getBBox();
            svg.setAttribute("width", bbox.x + bbox.width + 20);
            svg.setAttribute("height", bbox.height + 20);
        }
    </script>
    <form>
        <label for="cadre_v">Hauteur cadre:</label>
        <input type="text" id="cadre_v" name="cadre_v" value="980" onkeyup="draw()"><br>
        <label for="cadre_h">Largeur cadre:</label>
        <input type="text" id="cadre_h" name="cadre_h" value="780" onkeyup="draw()"><br>
        <label for="epaisseur_chevron">Epaisseur chevron:</label>
        <input type="text" id="epaisseur_chevron" name="epaisseur_chevron" value="60" onkeyup="draw()"><br>
        <label for="epaisseur_chevron">Epaisseur totale:</label>
        <input type="text" id="epaisseur_totale" name="epaisseur_totale" value="220" onkeyup="draw()"><br>
        <label for="angle_haut">Angle haut:</label>
        <input type="text" id="angle_haut" name="angle_haut" value="70" onkeyup="draw()"><br>
        <label for="angle_bas">Angle bas:</label>
        <input type="text" id="angle_bas" name="angle_bas" value="10" onkeyup="draw()"><br>
        <label for="angle_droite">Angle gauche:</label>
        <input type="text" id="angle_droite" name="angle_droite" value="30" onkeyup="draw()"><br>
        <label for="angle_gauche">Angle droite:</label>
        <input type="text" id="angle_gauche" name="angle_gauche" value="30" onkeyup="draw()"><br>
    </form>
    <svg id="svg" width="800" height="2400" id="plan" transform="translate(10,10)">
        <g id="face">
            <g class="content"></g>
        </g>
        <g id="gauche">
            <g class="content"></g>
        </g>
        <g id="dessus">
            <g class="content"></g>
        </g>
        <g id="eclatee"></g>

    </svg>
    <script>draw();</script>
</body>

</html>
